<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO Healthy City Relationship Map</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        canvas { border: 1px solid #ccc; display: block; margin: auto; }
    </style>
</head>
<body>
    <h1>WHO Healthy City Relationship Map</h1>
    <canvas id="mapCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById("mapCanvas");
        const ctx = canvas.getContext("2d");
        const healthFactors = ["Air Quality", "Water Quality", "Nutrition", "Physical Activity", "Mental Health", "Income", "Education", "Access to Healthcare", "Social Support", "Housing", "Safety", "Employment", "Environment"]; 
        let positions = [];

        function initPositions() {
            healthFactors.forEach((factor, index) => {
                positions.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    name: factor
                });
            });
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            positions.forEach(pos => {
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = 'blue';
                ctx.fill();
                ctx.closePath();
                ctx.fillStyle = 'white';
                ctx.fillText(pos.name, pos.x - 15, pos.y + 5);
            });
        }

        function physicsSimulation() {
            positions.forEach((pos, index) => {
                // Simulate forces and change positions
                pos.x += (Math.random() - 0.5) * 2;
                pos.y += (Math.random() - 0.5) * 2;
                pos.x = Math.max(20, Math.min(canvas.width - 20, pos.x));
                pos.y = Math.max(20, Math.min(canvas.height - 20, pos.y));
            });
        }

        function update() {
            physicsSimulation();
            drawMap();
            requestAnimationFrame(update);
        }

        initPositions();
        update();
    </script>
</body>
</html>
