<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO Healthy City Relationship Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        #map-container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div id="map-container">
        <canvas id="relationshipMap" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('relationshipMap');
        const context = canvas.getContext('2d');
        const nodes = [
            { id: 1, label: 'Node 1', x: 100, y: 100 },
            { id: 2, label: 'Node 2', x: 300, y: 200 },
            { id: 3, label: 'Node 3', x: 500, y: 100 },
            // Add more nodes
        ];

        function drawNode(node) {
            context.beginPath();
            context.arc(node.x, node.y, 20, 0, Math.PI * 2);
            context.fillStyle = '#007BFF';
            context.fill();
            context.strokeStyle = '#FFFFFF';
            context.stroke();
            context.closePath();
            context.fillStyle = '#000000';
            context.fillText(node.label, node.x - 10, node.y - 25);
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            nodes.forEach(drawNode);
        }

        draw();

        // Physics simulation and interactive features can be added here
    </script>
</body>

</html>
