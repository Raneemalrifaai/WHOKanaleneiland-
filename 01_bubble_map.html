<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHO Healthy City Relationship Map</title>
    <style>
        /* CSS styles for the map */
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>WHO Healthy City Relationship Map</h1>
    <div id="map"></div>
    <script>
        // JavaScript code to initialize the map
        function initMap() {
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 2,
                center: {lat: -25.363, lng: 131.044}
            });
        }
    </script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
    </script>
</body>
</html>
